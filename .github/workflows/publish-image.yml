name: publish-image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Docker tag to publish (e.g. latest, v3.6.0)
        required: true
        default: latest
        type: string
      update_action_yml:
        description: Update action.yml image to the published digest
        required: true
        default: true
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: compute image name
        id: image
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${repo_name}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and publish the docker image
        id: docker-build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.event.inputs.tag }}
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}

      - name: show published references
        run: |
          echo "Published image: ${{ steps.image.outputs.name }}:${{ github.event.inputs.tag }}"
          echo "Digest: ${{ steps.docker-build.outputs.digest }}"

      - name: update action.yml to point to the newly published image digest
        if: ${{ github.event.inputs.update_action_yml == 'true' }}
        run: |
          sed -i "s|image: .*|image: docker://${{ steps.image.outputs.name }}@${{ steps.docker-build.outputs.digest }}|" action.yml

      - name: commit action.yml update
        if: ${{ github.event.inputs.update_action_yml == 'true' }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add action.yml
          git commit -m "chore: point action.yml to ${{ steps.image.outputs.name }}@${{ steps.docker-build.outputs.digest }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}
