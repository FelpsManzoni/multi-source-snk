name: "generate-snake-game-from-github-contribution-grid"
description: "Generates a snake game from a github user contributions grid. Output the animation as gif or svg"
author: "platane"

runs:
  using: docker
  image: docker://platane/snk@sha256:3a66a51ca8eaecc1e841bc8baae39bd88079e57419850d1ed005eee2bbfce940

inputs:
  github_user_name:
    description: |
      GitHub user name to read the contribution graph from.
      Can include a custom host for GitHub Enterprise: "github.mycompany.com/username".
      At least one of github_user_name, gitlab_user_name, or forgejo_user_name is required.
    required: false
  github_token:
    description: "github token used to fetch the contribution calendar. Default to the action token if empty."
    required: false
    default: ${{ github.token }}
  gitlab_user_name:
    description: |
      GitLab user name to read the contribution graph from.
      Can include a custom host for self-hosted instances: "gitlab.mycompany.com/username".
      Contributions are combined with any other configured source.
    required: false
  forgejo_user_name:
    description: |
      Forgejo/Codeberg user name to read the contribution graph from.
      Must include the host: "codeberg.org/username" or "forgejo.mycompany.com/username".
      Contributions are combined with any other configured source.
    required: false
  outputs:
    required: false
    description: |
      list of files to generate.
      one file per line. Each output can be customized with options as query string.

       supported query string options:

      - palette:      A preset of color, one of [github, github-dark, github-light]
      - color_snake:  Color of the snake
      - color_dots:   Coma separated list of dots color.
                      The first one is 0 contribution, then it goes from the low contribution to the highest.
                      Exactly 5 colors are expected.
      example:
        outputs: |
          dark.svg?palette=github-dark&color_snake=blue
          light.svg?color_snake=#7845ab
          ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
